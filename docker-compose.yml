version: '3.8'

services:
  funds-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: funds-portfolio-mvp
    ports:
      - "5000:5000"
    environment:
      # Flask configuration
      - FLASK_APP=funds_portfolio.app
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      
      # Application settings
      - LOG_LEVEL=DEBUG
      - MAX_PORTFOLIO_WORKERS=2
    
    volumes:
      # Development: mount source code for live reload
      - ${PWD}/funds_portfolio:/app/funds_portfolio
      - ${PWD}/config:/app/config
      - ${PWD}/templates:/app/templates
      
      # Data directories
      - ${PWD}/portfolios:/app/portfolios
      - ${PWD}/logs:/app/logs
      
      # Config files
      - ./funds_database.json:/app/funds_database.json:ro
      - ./preferences_schema.json:/app/preferences_schema.json:ro
    
    # Keep container running, restart on failure
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Interactive terminal for debugging
    stdin_open: true
    tty: true

  # Optional: Add a simple nginx reverse proxy (for Heroku-like setup)
  # Uncomment if testing production-like setup locally
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - funds-api
  #   restart: unless-stopped

volumes:
  # Optional: Named volume for persistent portfolio storage (alternative to bind mount)
  portfolios_data:
    driver: local

# Network configuration (optional)
networks:
  default:
    name: funds-portfolio-network
    driver: bridge
